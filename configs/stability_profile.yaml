# High-stability recovery profile for TikZ training.
# Use this when Rank 24/32 runs collapse or show prompt-contract poisoning.

training:
  learning_rate: 3.0e-06       # Conservative Stage 1 recovery rate
  lora_rank: 16                # Lower than Rank 24/32, but still enough TikZ capacity
  lora_alpha: 32               # Standard alpha=2*rank
  lora_num_layers: 28
  weight_decay: 0.1            # Higher regularization
  steps_per_save: 512          # Must align with grad_accum=8
  steps_per_eval: 64
  
model:
  max_context_tokens: 768      # Stick to verified context length
  
memory:
  gradient_accumulation_steps: 8 # Higher effective batch size for smoother gradients
  batch_size: 1
