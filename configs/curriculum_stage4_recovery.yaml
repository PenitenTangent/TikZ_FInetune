paths:
  data_dir: data
  prepared_dir: data/prepared
  manifests_dir: data/manifests
  outputs_dir: outputs
  runs_dir: runs
  cache_dir: .cache
model:
  model_id: mlx-community/gemma-4-e4b-it-6bit
  max_context_tokens: 1792
  max_output_tokens: 2048
  image_resize_shape:
  - 448
  - 448
  temperature: 1.0
  top_p: 0.9
  top_k: 64
  enable_thinking: false
compiler:
  tectonic_binary: tools/bin/tectonic
  timeout_seconds: 15
  keep_logs: true
  keep_intermediates: false
  untrusted: true
memory:
  batch_size: 1
  gradient_checkpointing: true
  gradient_accumulation_steps: 4
  freeze_vision: true
  clear_cache_between_retries: true
  retry_cache_policy: clear
  peak_memory_abort_gb: 18.0
  wired_limit_fraction: 0.9
dataset:
  min_chars: 100
  max_chars: 4000
  split_seed: 17
  supported_environments:
  - tikzpicture
  - tikz-cd
  - circuitikz
  reject_external_dependencies: true
  deduplicate: true
inference:
  max_retries: 3
  repair_max_retries: 2
  visual_refine_on_success: true
  debug_grid_step_px: 32
  initial_candidates: 4
  compile_repair_candidates: 2
  visual_repair_candidates: 2
  initial_decoding:
    max_tokens: 4096
    temperature: 0.0
    top_p: 1.0
    top_k: 64
    min_p: 0.05
    repetition_penalty: 1.15
  compile_repair_decoding:
    max_tokens: 896
    temperature: 0.3
    top_p: 0.85
    top_k: 48
    min_p: 0.05
    repetition_penalty: 1.1
  visual_repair_decoding:
    max_tokens: 896
    temperature: 0.6
    top_p: 0.9
    top_k: 64
    min_p: 0.04
    repetition_penalty: 1.06
training:
  dataset_path: data/prepared/curriculum/train_stage4_clean.jsonl
  train_dataset_path: data/prepared/curriculum/train_stage4_clean.jsonl
  val_dataset_path: data/prepared/val_unified_clean.jsonl
  gold_eval_dataset_path: data/prepared/gold_eval_unified_clean.jsonl
  require_nonempty_validation_dataset: true
  require_nonempty_gold_eval_dataset: true
  min_validation_compilation_rate: 0.20
  validation_compile_probe_limit: 8
  dry_run_steps: 2
  learning_rate: 2.0e-05
  max_grad_norm: 1.0
  epochs: 1
  iters: 120
  pretokenized_packed_cache_path: null
  pretokenized_cache_path: data/prepared/curriculum/train_stage4_clean_tokenized.npy
  steps_per_save: 25
  steps_per_eval: 25
  val_batches: 4
  checkpoint_keep_last: 40
  checkpoint_cleanup_interval_seconds: 20
  lora_rank: 24
  lora_alpha: 48
  lora_dropout: 0.0
  lora_num_layers: 28
  auto_resume_latest_checkpoint: false
  train_on_completions: true
  assistant_id: 4368
  completion_mask_preflight_enabled: true
  completion_mask_preflight_rows: 2500
  completion_mask_preflight_min_marker_hit_rate: 0.9
  completion_mask_preflight_min_mask_zero_fraction: 0.01
  reward_weighted_loss: false
  reward_weight_field: sample_weight
  reward_weight_floor: 0.0
  reward_weight_ceil: 1.0
  reward_weight_path: null
  syntax_weighted_loss: false
  syntax_weight_path: null
  syntax_structural_weight: 5.0
  syntax_command_weight: 2.0
  syntax_coordinate_weight: 1.0
  weight_decay: 0.01
  allow_full_training: true
  resume_adapter_path: null
  coverage:
    enabled: false
    strict_fingerprint: true
    require_state_for_resume: true
    save_interval_steps: 200
    order_mode: epoch-shuffle
    order_seed_base: 17
    state_file_name: coverage_state_clean_adapter.json
    lock_file_name: train_clean_adapter.lock
    epoch_orders_dir_name: epoch_orders_clean_adapter
