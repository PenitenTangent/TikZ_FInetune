paths:
  data_dir: data
  prepared_dir: data/prepared
  manifests_dir: data/manifests
  outputs_dir: outputs
  runs_dir: runs
  cache_dir: .cache

model:
  model_id: mlx-community/gemma-4-e4b-it-6bit
  max_context_tokens: 1536
  max_output_tokens: 2048
  image_resize_shape: [448, 448]
  temperature: 1.0
  top_p: 0.9
  top_k: 64
  enable_thinking: false

compiler:
  tectonic_binary: tools/bin/tectonic
  timeout_seconds: 15
  keep_logs: true
  keep_intermediates: false
  untrusted: true

memory:
  batch_size: 1
  gradient_checkpointing: true    # Enabled to prevent OS crashes; trades off ~30% speed for memory stability.
  gradient_accumulation_steps: 4  # Effective batch = 4; better gradient stability without increasing activation memory.
  freeze_vision: true             # vision tower not trained (irrelevant for TikZ)
  clear_cache_between_retries: true
  retry_cache_policy: clear
  peak_memory_abort_gb: 18.0      # Lowered for safety margin to prevent OS hangs
  wired_limit_fraction: 0.9

dataset:
  min_chars: 100
  max_chars: 4000
  split_seed: 17
  supported_environments:
    - tikzpicture
    - tikz-cd
    - circuitikz
  reject_external_dependencies: true
  deduplicate: true

inference:
  max_retries: 3
  repair_max_retries: 2
  visual_refine_on_success: true
  debug_grid_step_px: 32
  initial_candidates: 4
  compile_repair_candidates: 2
  visual_repair_candidates: 2
  initial_decoding:
    max_tokens: 2048
    temperature: 0.0
    top_p: 1.0
    top_k: 64
    min_p: 0.05
    repetition_penalty: 1.15  # raised from 1.08; suppresses '\\' token attractor exposed by diagnostics
  compile_repair_decoding:
    max_tokens: 896
    temperature: 0.3
    top_p: 0.85
    top_k: 48
    min_p: 0.05
    repetition_penalty: 1.1
  visual_repair_decoding:
    max_tokens: 896
    temperature: 0.6
    top_p: 0.9
    top_k: 64
    min_p: 0.04
    repetition_penalty: 1.06

training:
  dataset_path: data/prepared/train_unified.jsonl
  val_dataset_path: data/prepared/val_unified.jsonl
  gold_eval_dataset_path: data/prepared/gold_eval_unified.jsonl
  require_nonempty_validation_dataset: true
  require_nonempty_gold_eval_dataset: true
  min_validation_compilation_rate: 0.0
  validation_compile_probe_limit: 25
  dry_run_steps: 2
  learning_rate: 3.0e-05  # plan §1.2: 3e-5 peak LR (was 1e-4)
  max_grad_norm: 1.0
  epochs: 1
  # Sequence packing: ~2× throughput (see pack audit for exact counts).
  # Generated by: python tools/pack_tokenized_dataset.py --input data/prepared/train_tokenized.npy --output data/prepared/train_packed.npy
  pretokenized_packed_cache_path: data/prepared/train_packed.npy
  # Fallback (non-packed pre-tokenized cache):
  # pretokenized_cache_path: data/prepared/train_tokenized.npy
  steps_per_save: 2000
  steps_per_eval: 200   # Needed for LR sweep and checkpoint selection; do not disable validation.
  checkpoint_keep_last: 1
  checkpoint_cleanup_interval_seconds: 20
  lora_rank: 24          # plan §1.1 safe config (was 8 for Ablation 0)
  lora_alpha: 48         # alpha = 2 × rank; stable scaling (was 16)
  lora_dropout: 0.0      # plan §1.2: zero dropout for precise syntax (was 0.1)
  lora_num_layers: 28    # all 28 layers; QLoRA recommendation (was 16)
  auto_resume_latest_checkpoint: false
  train_on_completions: true
  assistant_id: 4368
  completion_mask_preflight_enabled: true
  completion_mask_preflight_rows: 2500
  completion_mask_preflight_min_marker_hit_rate: 0.9
  completion_mask_preflight_min_mask_zero_fraction: 0.01
  reward_weighted_loss: false
  reward_weight_field: sample_weight
  reward_weight_floor: 0.0
  reward_weight_ceil: 1.0
  reward_weight_path:
  syntax_weighted_loss: true
  syntax_weight_path:
  syntax_structural_weight: 5.0
  syntax_command_weight: 2.0
  syntax_coordinate_weight: 1.0
  weight_decay: 0.01             # plan §1.4: standard transformer regularization
  allow_full_training: true
  resume_adapter_path:
  coverage:
    enabled: false  # Packed cache is enabled above; strict coverage is only supported for unpacked JSONL training.
    strict_fingerprint: true
    require_state_for_resume: true
    save_interval_steps: 200  # was 10 (22k writes/epoch); 200 = 1100 writes, negligible resume granularity loss
    order_mode: epoch-shuffle
    order_seed_base: 17
    state_file_name: coverage_state.json
    lock_file_name: train.lock
    epoch_orders_dir_name: epoch_orders
  stage2:
    enabled: false
    allow_full_training: false
    dataset_path: data/prepared/train_stage2.jsonl
    val_dataset_path: data/prepared/val_stage2.jsonl
    gold_eval_dataset_path: data/prepared/gold_eval_stage2.jsonl
    output_path: runs/tikz_stage2_adapter.safetensors
    checkpoint_dir: runs/stage2_checkpoints
    reward_cache_dir: .cache/stage2/references
    telemetry_path: runs/stage2_checkpoints/metrics.jsonl
    reward_model_id: gemini-3.1-flash-lite-preview
    resume_adapter_path:
    reward_backend: emd
    rollout_group_size: 8
    smoke_rollout_group_size: 2
    learning_rate: 0.0001
    max_rollout_tokens: 2048
    smoke_max_rollout_tokens: 256
    temperature: 1.0
    top_p: 0.9
    top_k: 64
    clip_epsilon_low: 0.2
    clip_epsilon_high: 0.28
    beta: 0.0
    normalize_by_max_length: true
    scale_advantages_by_std: false
    mask_truncated_completions: true
    steps_per_report: 1
    steps_per_save: 1
    iters: 100
    smoke_steps: 1
    cache_reference_artifacts: true
    reward_compile_floor: 0.655
    reward_format_floor: 0.175
    promotion_min_reward: 0.575
    promotion_min_compile_rate: 0.815
    fail_on_invalid_rollout: true
    dead_signal_watchdog_enabled: true
    dead_signal_watchdog_windows: 3
    dead_signal_watchdog_min_format_reject_rate: 0.95
    dead_signal_watchdog_min_truncated_rate: 0.95
